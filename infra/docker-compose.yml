# angryang.dev — self-hosted stack (9 services).
# TLS terminates at the EXTERNAL router Caddy; these services bind plain HTTP on
# the LAN. The router lives on a DIFFERENT machine, so host ports must be
# reachable over the LAN (bind addr defaults to all interfaces). Override
# BIND_ADDR in .env to restrict (e.g. to the LAN IP) — do NOT use 127.0.0.1
# unless the router proxies from this same host.
#
#   docker compose -f infra/docker-compose.yml up -d
#
# Image tags are pinned via *_TAG vars in .env (default to a sensible tag). For
# real supply-chain safety, pin to a DIGEST in .env:
#   POCKETBASE_TAG=sha256:<digest>   (see docs/CHEATSHEET.md "pin images").
# Build context for the web image is the repo root (..) for the Bun workspace.

name: angryang-dev

x-hardening: &hardening
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

services:
  web:
    <<: *hardening
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    env_file: .env
    environment:
      PB_URL: http://pocketbase:8090
      NTFY_URL: http://ntfy:80
      GOTENBERG_URL: http://gotenberg:3000
    ports:
      - "${BIND_ADDR:-0.0.0.0}:4321:4321"
    depends_on:
      - pocketbase
    networks: [web, internal]

  pocketbase:
    <<: *hardening
    # MUST be >= 0.23 — pb_hooks use the v0.23+ JSVM API (see .env.example).
    image: ghcr.io/muchobien/pocketbase:${POCKETBASE_TAG:-0.28.4}
    # Volume-mount hooks for fast iteration (edit → restart, no rebuild).
    # For a baked image instead, build docker/pocketbase.Dockerfile.
    volumes:
      - ../services/pocketbase/pb_hooks:/pb/pb_hooks
      - ../services/pocketbase/pb_migrations:/pb/pb_migrations
      - pb_data:/pb/pb_data
    environment:
      NTFY_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC}
    ports:
      - "${BIND_ADDR:-0.0.0.0}:8090:8090"
    networks: [web, internal]

  umami:
    <<: *hardening
    image: ghcr.io/umami-software/umami:${UMAMI_TAG:-postgresql-latest}
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER}:${UMAMI_DB_PASSWORD}@umami-db:5432/${UMAMI_DB_NAME}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    ports:
      - "${BIND_ADDR:-0.0.0.0}:3000:3000"
    depends_on:
      - umami-db
    networks: [web, internal]

  umami-db:
    <<: *hardening
    image: postgres:${POSTGRES_TAG:-16-alpine}
    environment:
      POSTGRES_USER: ${UMAMI_DB_USER}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: ${UMAMI_DB_NAME}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks: [internal]

  wakapi:
    <<: *hardening
    image: ghcr.io/muety/wakapi:${WAKAPI_TAG:-2.13.1}
    environment:
      WAKAPI_PASSWORD_SALT: ${WAKAPI_SALT}
      WAKAPI_DB_TYPE: sqlite3
    volumes:
      - wakapi_data:/data
    ports:
      - "${BIND_ADDR:-0.0.0.0}:3001:3000"
    networks: [web, internal]

  cal:
    <<: *hardening
    image: calcom/cal.com:${CAL_TAG:-v4.7.5}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${CAL_DB_USER}:${CAL_DB_PASSWORD}@cal-db:5432/${CAL_DB_NAME}
      NEXTAUTH_SECRET: ${CAL_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CAL_ENCRYPTION_KEY}
      NEXT_PUBLIC_WEBAPP_URL: https://cal.ryang.dev
    ports:
      - "${BIND_ADDR:-0.0.0.0}:3002:3000"
    depends_on:
      - cal-db
    networks: [web, internal]

  cal-db:
    <<: *hardening
    image: postgres:${POSTGRES_TAG:-16-alpine}
    environment:
      POSTGRES_USER: ${CAL_DB_USER}
      POSTGRES_PASSWORD: ${CAL_DB_PASSWORD}
      POSTGRES_DB: ${CAL_DB_NAME}
    volumes:
      - cal_db_data:/var/lib/postgresql/data
    networks: [internal]

  ntfy:
    <<: *hardening
    image: binwiederhier/ntfy:${NTFY_TAG:-v2.11.0}
    command: serve
    environment:
      NTFY_BASE_URL: https://ntfy.ryang.dev
    volumes:
      - ntfy_data:/var/lib/ntfy
    # internal only — web + pocketbase POST to it over the compose network
    networks: [internal]

  uptime-kuma:
    <<: *hardening
    image: louislam/uptime-kuma:${KUMA_TAG:-1.23.16}
    volumes:
      - kuma_data:/app/data
    ports:
      - "${BIND_ADDR:-0.0.0.0}:3010:3001"
    networks: [web, internal]

  gotenberg:
    <<: *hardening
    image: gotenberg/gotenberg:${GOTENBERG_TAG:-8.20.0}
    # gotenberg needs SYS_ADMIN for Chromium's sandbox; drop everything else.
    cap_drop: [ALL]
    cap_add: [SYS_ADMIN]
    command:
      - "gotenberg"
      - "--api-timeout=30s"
    # internal only — web POSTs HTML and gets back a PDF
    networks: [internal]

networks:
  web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  pb_data:
  umami_db_data:
  wakapi_data:
  cal_db_data:
  ntfy_data:
  kuma_data:
