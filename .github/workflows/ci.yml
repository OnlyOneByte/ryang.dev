name: CI

on:
  push:
    branches: [main]
  pull_request:

# `build` + `pocketbase-smoke` only need to read the repo. The publish-* jobs
# below additionally need packages:write to push images to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit (advisory)
        run: bun audit || true
        continue-on-error: true

      - name: Type-check
        run: bun run --filter web check

      - name: Contrast gate (WCAG AA across all themes)
        run: bun run --filter web contrast

      - name: Unit tests
        run: bun run --filter web test

      - name: Build
        run: bun run --filter web build
        env:
          PUBLIC_BUILD_SHA: ${{ github.sha }}

      # Advisory for now (a11y is blocking via lighthouserc). Make perf blocking
      # once the numbers settle. Runs against the prerendered client output.
      - name: Lighthouse CI
        run: |
          bunx @lhci/cli@0.14.x autorun --config=apps/web/lighthouserc.json || true
        continue-on-error: true

  # Proves the Pocketbase moderation hook actually ENFORCES at runtime — a green
  # `build` job does NOT (hooks load from disk, run in an isolated JSVM, and the
  # schema is imported, none of which the build exercises). This job builds the
  # baked image (so it tests exactly what ships), boots it, and runs the
  # self-approve probe. It catches: wrong --hooksDir path, hook runtime throws,
  # and a pre-0.23-format schema that imports as empty-fielded shells.
  pocketbase-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build baked Pocketbase image
        run: docker build -f docker/pocketbase.Dockerfile -t ryangdev-pocketbase:ci .

      - name: Boot Pocketbase
        run: docker run -d -p 8090:8090 --name pb ryangdev-pocketbase:ci

      - name: Smoke test (boots PB, imports schema, self-approve probe)
        env:
          PB_URL: http://localhost:8090
          PB_CONTAINER: pb
        run: bash services/pocketbase/smoke-test.sh

      - name: Dump PB logs on failure
        if: failure()
        run: docker logs pb || true

  # ── Publish images to GHCR ──────────────────────────────────────────────────
  # Only on push to main, AFTER the gating job is green. PRs run build/smoke but
  # never push (the `if` is false for pull_request). These prebuilt images let a
  # host pull instead of building from source; the in-repo infra/ compose still
  # builds locally for dev. See docs/DEPLOYMENT.md §0.
  #
  # Image names use ${{ github.repository }}, so the GHCR namespace tracks the
  # repo's owner/name automatically (a rename just moves the path).
  publish-web:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=main
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: linux/amd64
          push: true
          # Stamps the build-info footer with the deploy SHA (see web.Dockerfile).
          build-args: |
            PUBLIC_BUILD_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-pocketbase:
    # Gated on the smoke test — proves the moderation hook ENFORCES before the
    # baked image (hooks baked in, no bind mount on the box) can ship.
    needs: pocketbase-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/pocketbase
          tags: |
            type=raw,value=main
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & push pocketbase (hooks baked in)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pocketbase.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
